<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華網路共和國第一號主席令</title>
   <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 基础样式 */
        body {
            background-color: #fff;
            font-family: "FangSong", "仿宋", serif;
            color: #333;
            line-height: 1.6;
        }

        /* 容器类 */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部导航栏 */
        .header {
            background-color: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 15px 0;
        }

        .header__wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header__left {
            display: flex;
            align-items: center;
        }

        .header__emblem {
            width: 50px;
            height: 50px;
            margin-right: 12px;
            transition: transform 0.2s ease;
        }

        .header__emblem:hover {
            transform: scale(1.05);
        }

        .header__site-info {
            display: flex;
            flex-direction: column;
        }

        .header__full-name {
            font-size: 22px;
            font-weight: bold;
            color: #d00;
            line-height: 1.2;
        }

        .header__domain {
            font-size: 12px;
            color: #666;
            line-height: 1.2;
        }

        .header__right {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .header__lang-link {
            color: #333;
            text-decoration: none;
            margin: 0 8px;
            transition: color 0.2s ease;
        }

        .header__lang-link:hover {
            color: #d00;
            text-decoration: underline;
        }

        .header__divider {
            color: #ccc;
            margin: 0 5px;
        }

        /*中华网络共和国第一号主席令内容*/
        .main-title{/*标题*/
            text-align: center;
            font-size: 30px;
            margin-top: 20px;
            clear: both;
        }

        .history{
            text-align: center;
            color: navy;
            font-size: 20px;
            margin-top: 10px;
            clear: both;
        }

        .table-of-contents-title{
            display: block;
            font-size: 20px;
            margin-top: 7px;
            margin: 7px auto 0;
            clear: both;
            text-align: center;
        }

        .table-of-number{
            display: block;
            margin-left: 60px;
            font-size: 20px;
            margin-top: 7px;
            clear: both;
            margin: 7px auto 0;
            text-align: center;   
        }
        
        .table-of-contents{
            margin-left: 60px;
            font-size: 20px;
            margin-top: 7px;
            clear: both;
        }

        .table-of-nameAndDate{
            margin-left: 60px;
            font-size: 20px;
            margin-top: 7px;
            clear: both;
            text-align: right;
        }

        /* 分割线 */
        .divider {
            border: none;
            height: 1px;
            background-color: #ccc;
            margin: 20px auto;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header__full-name {
                font-size: 18px;
            }

            .map-section__title,
            .legal-section__title {
                font-size: 20px;
            }

            .map-section__desc {
                font-size: 16px;
            }

            .section__title {
                font-size: 18px;
            }

            .section__text {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .header__wrapper {
                flex-direction: column;
                align-items: flex-start;
            }

            .header__right {
                margin-top: 10px;
            }

            .main__wrapper {
                gap: 20px;
            }
        }

    </style>

</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header__wrapper">
            <!-- 左侧：国徽 + 名称 -->
            <div class="header__left">
                <a href="https://s41.ax1x.com/2026/02/18/pZOXeR1.png" target="_blank">
                    <img src="https://s41.ax1x.com/2026/02/18/pZOXeR1.png" alt="中華網路共和國國徽" class="header__emblem">
                </a>
                <div class="header__site-info">
                    <span class="header__full-name">中華網路共和國中央人民政府</span>
                    <span class="header__domain">www.rocc.gov.cc</span>
                </div>
            </div>
            <!-- 右侧：语言切换 -->
            <div class="header__right">
                <a href="ROCC Constitution zh-CN.html" class="header__lang-link" data-lang="zh-CN">简体</a>
                <a href="ROCC Constitution zh-TW.html" class="header__lang-link" data-lang="zh-TW">繁體</a>
                <a href="ROCC Constitution en.html" class="header__lang-link" data-lang="en">EN</a>
                <span class="header__divider">|</span>
            </div>
        </div>
    <script>
        // 语言切换逻辑
        document.querySelectorAll('.header__lang-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const langMap = {
                    'zh-CN': '简体中文',
                    'zh-TW': '繁体中文',
                    'en': '英文'
                };
                const lang = this.getAttribute('data-lang');
                alert(`即将切换到 ${langMap[lang] || lang} 版本`);
        });
    });
    </script>
    </header>
    <h1 class="main-title">中華網路共和國第一號主席令</h1>
    <p class="table-of-number">第一号</p>
    <p class="table-of-contents">《中華網路共和國憲法》已由中華網路共和國第一屆全國人民代表大會第一次會議通過，現在予以公布，自公布之日起施行</p>
    <div class="table-of-nameAndDate">
        <p>中華網絡共和國國家主席 侯闊<br>2025年12月14日</p>
    </div>
     <hr class="divider">
    <b class="table-of-contents">相关文件</b>
    <a href="ROCC Constitution zh-CN.html"target="_blank">
        <b class="table-of-contents">中華網路共和國憲法</b>
    </a>
    <br>
    <b class="table-of-contents">開發人員聯絡方式：houkuo201139（Wechat ID）</b>
</body>
</html>
